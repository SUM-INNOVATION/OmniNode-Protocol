[package]
name             = "omni-proofs-halo2-reference"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
repository.workspace = true
rust-version.workspace = true

# Stage 11b.1.b: feature-gated halo2 reference verifier + prover.
#
# Default build (`cargo build -p omni-proofs-halo2-reference`) still
# pulls zero halo2 / heavy deps â€” preserves the Stage 11b.1.a
# invariant that the operator binary's compile graph never reaches
# halo2_proofs.
#
#   - default = []           : pure-Rust scaffold from 11b.1.a only
#                              (spec + evaluator + manifests).
#   - feature `verify`       : adds the halo2 circuit + verifier;
#                              pulls halo2_proofs (verifier-side
#                              code only via cfg-gating at our crate
#                              boundary â€” halo2_proofs 0.3.2 does
#                              not split its own crate features into
#                              verify-only / prove-only).
#   - feature `prove`        : adds the developer-host prover
#                              helper. Superset of `verify`. Pulls
#                              rand_chacha (deterministic RNG for
#                              byte-stable proof generation).
#
# CI runs the `verify` feature; the `prove` feature only runs in the
# developer-host regen tool at `tools/halo2_reference_regen/`
# (workspace-excluded, like `tools/rumus_export/`).

[features]
default = []
verify  = ["dep:halo2_proofs"]
prove   = ["verify", "dep:rand_chacha"]

[dependencies]
omni-zkml  = { workspace = true }
serde      = { workspace = true }
serde_json = { workspace = true }
blake3     = { workspace = true }
thiserror  = { workspace = true }

# Stage 11b.1.b â€” halo2 reference verifier/prover. Opt-in via the
# `verify` / `prove` features above; default-features = false to
# avoid pulling rand_core/getrandom (the `batch` feature) and
# maybe-rayon (the `multicore` feature) into the default build.
# Single-threaded proving + non-batched verification are sufficient
# for the bounded 4â†’8â†’4 circuit at k â‰¤ 12, and removing those
# default features keeps the verifier-only dep tree minimal +
# byte-deterministic.
halo2_proofs = { version = "0.3.2", default-features = false, optional = true }

# Stage 11b.1.b â€” deterministic RNG for byte-stable proof regen.
# Only pulled by the `prove` feature; never reachable from
# `verify`-only builds.
rand_chacha = { version = "0.3", default-features = false, optional = true }

[build-dependencies]
blake3 = { workspace = true }
