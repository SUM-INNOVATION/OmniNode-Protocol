# OmniNode Protocol — CI matrix (decoupling gates PAUSED pending Stage 9c).
#
# Stage 9b originally shipped a HARD GATE matrix that would have
# enforced Stage 9a's claim that fresh source builds need no GitHub
# access to the private `SUM-INNOVATION/sum-chain` repo. On the very
# first run against `origin/main` the gates correctly exposed that
# the claim was wrong:
#
#   - `cargo build -p omni-node` and `cargo tree -p omni-node`,
#     even with no feature flags, fail at workspace resolution time
#     on a runner without GitHub credentials. Cargo clones git
#     dependencies — INCLUDING `optional = true` ones — to satisfy
#     resolution before any feature gate is evaluated. So even
#     though Stage 9a moved the submit code path behind a feature,
#     the git dep is still in the workspace and Cargo still tries
#     to fetch it.
#
# Adding credentials to the default CI jobs would only hide the bug;
# the whole point of those gates was to PROVE that fresh / external
# operators can build the read-only surface without private repo
# access. They cannot, yet.
#
# Track A (chain team publishes `sumchain-primitives` /
# `sumchain-crypto` to crates.io) is the real fix. Once those crates
# are public, the workspace dep swap in Stage 9c eliminates the git
# source entirely, Cargo never needs to clone anything private, and
# the gates we wrote will simply pass on a fresh runner without
# modification.
#
# Until Track A lands:
#   - `stage6-fixture-check` stays — it only needs `git diff`, no
#     Cargo resolution involved. Useful even today.
#   - A `decoupling-status-notice` job emits a `::notice::` on every
#     run so PR reviewers see the true current state, not a stale
#     "HARD GATE" badge.
#   - `default-build-test`, `default-tree-check`, `check-submit-auth`,
#     `submit-build-test`, and `submit-skip-notice` are REMOVED from
#     this file. The Stage 9b commit (`fa1cacf`) preserves their full
#     design in git history; Stage 9c will reintroduce the cargo-side
#     gates fresh against the public dep source.
#
# DO NOT re-enable cargo-touching gates by credentialing the default
# jobs. The decoupling claim must become literally true at the
# resolution layer (Stage 9c), not hidden behind CI secrets.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  decoupling-status-notice:
    name: Stage 9a/9b decoupling — partial; awaiting Stage 9c (public sumchain crates)
    runs-on: ubuntu-latest
    steps:
      - name: Decoupling status
        shell: bash
        run: |
          cat <<'EOF'
          ::notice::Decoupling gates paused until Stage 9c (public sumchain crates land).
          Stage 9a moved the submit code path behind a cargo feature,
          but fresh source builds still require GitHub access to the
          private SUM Chain repo at Cargo resolution time. Cargo
          clones optional git deps even when the feature is off.

          Adding credentials to default CI would just hide this from
          fresh / external operators. The real fix is Track A: chain
          team publishes sumchain-primitives / sumchain-crypto on
          crates.io. The cargo-side gates from the original Stage 9b
          workflow (default-build-test, default-tree-check,
          submit-build-test) are removed from this file and will be
          reintroduced in Stage 9c fresh against the public dep
          source.

          Stage 6 chain-wire + fixture byte-stability still runs
          below — it does not need Cargo resolution.
          EOF

  stage6-fixture-check:
    name: Stage 6 chain-wire + fixture — byte-stable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need a base commit for diff

      - name: Resolve base ref
        id: base
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ref="${{ github.event.pull_request.base.sha }}"
          else
            ref="${{ github.event.before }}"
          fi
          if [ -z "$ref" ] || [ "$ref" = "0000000000000000000000000000000000000000" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true"  >> "$GITHUB_OUTPUT"
            echo "ref=$ref"        >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — no usable base ref
        if: steps.base.outputs.available == 'false'
        run: |
          echo "::notice::No usable base ref (initial push or shallow). Stage 6"
          echo "          byte-stability is still required; will re-verify on the"
          echo "          next push or PR."

      - name: Assert chain-wire fixture + chain_wire.rs byte-identical
        if: steps.base.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          base="${{ steps.base.outputs.ref }}"
          diff_out="$(git diff --stat "$base"..HEAD -- \
            crates/omni-zkml/tests/fixtures/chain_attestation_vectors.json \
            crates/omni-zkml/src/chain_wire.rs)"
          if [ -n "$diff_out" ]; then
            {
              echo "::error::Stage 6 byte-stability gate failed."
              echo "These files are byte-stable across all post-Stage-6 work:"
              echo "  crates/omni-zkml/tests/fixtures/chain_attestation_vectors.json"
              echo "  crates/omni-zkml/src/chain_wire.rs"
              echo
              echo "Observed diff vs $base:"
              echo "$diff_out"
            } >&2
            exit 1
          fi
          echo "Stage 6 fixture + chain_wire.rs: byte-identical vs $base."
