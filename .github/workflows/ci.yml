# OmniNode Protocol — CI matrix (Stage 9c: cargo-side gates restored
# against the public sumchain crates).
#
# Stage 9c retired the private `SUM-INNOVATION/sum-chain` git
# dependency in favour of the chain team's crates.io publish
# (`sumchain-primitives` / `sumchain-crypto` v0.1.0, dual-licensed
# MIT OR Apache-2.0, byte-equivalent to the previously-vendored rev
# d83e45a4 for the InferenceAttestation surface). The cargo-touching
# gates that Stage 9b shipped — and then had to pause when its first
# run exposed Cargo's optional-git-dep behaviour — are restored here
# and now actually run on a fresh runner without any credentials.
#
# Trigger surface: push to `main` + pull_request targeting `main`.
#
# Jobs:
#   1. default-build-test     — public; builds + tests the workspace
#                               minus the PyO3 `omni-bridge` crate
#                               under default features.
#   2. default-tree-check     — HARD GATE: `cargo tree -p omni-node`
#                               must NOT contain `sumchain-(crypto|
#                               primitives)`. The Stage 9a feature
#                               gating keeps these out of the
#                               read-only build's compile graph.
#   3. submit-build-test      — public (no secret); builds + tests
#                               `--features submit` for `omni-sumchain`
#                               and `omni-node`. Live `#[ignore]`'d
#                               tests are NOT run in CI.
#   4. submit-tree-check      — HARD GATE: `cargo tree -p omni-node
#                               --features submit` MUST contain the
#                               public chain crates. Catches the
#                               submit feature silently going inert.
#   5. stage6-fixture-check   — HARD GATE: `git diff` for
#                               `chain_attestation_vectors.json` +
#                               `chain_wire.rs` must be empty vs the
#                               PR base / push parent.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  # ── (1) Default features: read-only operator surface ────────────────────────
  default-build-test:
    name: default (read-only) — build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain (honours rust-toolchain.toml)
        run: rustup show active-toolchain || rustup show

      - name: Cache cargo registry / git / target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-default-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-default-

      - name: cargo build -p omni-node (default features)
        run: cargo build -p omni-node

      - name: cargo test (workspace minus omni-bridge / PyO3)
        run: |
          cargo test \
            -p omni-net \
            -p omni-pipeline \
            -p omni-store \
            -p omni-types \
            -p omni-zkml \
            -p omni-sumchain \
            -p omni-node

  # ── (2) Default dep-tree: HARD GATE — feature gating keeps submit out ──────
  default-tree-check:
    name: default tree — must NOT contain sumchain-(crypto|primitives)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: rustup show active-toolchain || rustup show

      - name: Cache cargo registry / git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-tree-default-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tree-default-

      - name: Assert `omni-node` default tree has NO sumchain crates
        shell: bash
        run: |
          set -euo pipefail
          tree_out="$(cargo tree -p omni-node)"
          if echo "$tree_out" | grep -E 'sumchain-(crypto|primitives)'; then
            {
              echo "::error::Default \`omni-node\` build pulls sumchain-crypto / sumchain-primitives."
              echo "The Stage 9a feature gating must keep those out of the default"
              echo "graph; only --features submit should pull them in (now from"
              echo "crates.io, but still gated by the `submit` cargo feature)."
            } >&2
            exit 1
          fi
          echo "default tree: no sumchain-crypto / sumchain-primitives — feature gating intact."

      # Stage 11b.1.b — same gate, but for the halo2 reference
      # dependencies. Default omni-node MUST NOT pull halo2_proofs
      # or pasta_curves; only `--features halo2-reference-verify`
      # is allowed to.
      - name: Assert `omni-node` default tree has NO halo2 / pasta crates
        shell: bash
        run: |
          set -euo pipefail
          tree_out="$(cargo tree -p omni-node)"
          if echo "$tree_out" | grep -E 'halo2_proofs|pasta_curves'; then
            {
              echo "::error::Default \`omni-node\` build pulls halo2_proofs / pasta_curves."
              echo "The Stage 11b.1.b feature gating must keep those out of the default"
              echo "graph; only --features halo2-reference-verify should pull them in."
            } >&2
            exit 1
          fi
          echo "default tree: no halo2_proofs / pasta_curves — Stage 11b.1.b isolation intact."

      # Stage 11d.2 — explicit isolation guard for the production
      # halo2 verifier crate. Default omni-node MUST NOT pull
      # `omni-proofs-halo2-production-mlp`; the `stage11d-production-verify`
      # feature is the only legitimate entry point.
      - name: Assert `omni-node` default tree has NO production-mlp crate
        shell: bash
        run: |
          set -euo pipefail
          tree_out="$(cargo tree -p omni-node)"
          if echo "$tree_out" | grep -E 'omni-proofs-halo2-production-mlp'; then
            {
              echo "::error::Default \`omni-node\` build pulls omni-proofs-halo2-production-mlp."
              echo "Stage 11d.2 feature gating must keep that crate out of the default"
              echo "graph; only --features stage11d-production-verify should pull it in."
            } >&2
            exit 1
          fi
          echo "default tree: no omni-proofs-halo2-production-mlp — Stage 11d.2 isolation intact."

      # Stage 12.0 — omni-contributor is intentionally INCLUDED in the
      # default omni-node graph (the `operator contributor …`
      # subcommand needs it). Assert presence as a hard gate — if the
      # workspace dep wiring ever breaks, this catches it before
      # operators discover the missing subcommand at runtime.
      - name: Assert `omni-node` default tree DOES contain omni-contributor
        shell: bash
        run: |
          set -euo pipefail
          if ! cargo tree -p omni-node | grep -Eq 'omni-contributor'; then
            {
              echo "::error::Default \`omni-node\` build no longer pulls omni-contributor."
              echo "Stage 12.0 wiring is broken; the operator contributor subcommand will"
              echo "fail to compile or vanish from --help."
            } >&2
            exit 1
          fi
          echo "default tree: omni-contributor present — Stage 12.0 wiring intact."

      # Stage 12.0 — and despite that, omni-contributor MUST NOT pull
      # any halo2/prover/framework runtime into the default graph. The
      # earlier "no halo2_proofs / pasta_curves" check covers this,
      # but call out the Stage 12.0 invariant explicitly for clarity.
      - name: Assert `omni-node` default tree (with omni-contributor) still has NO halo2
        shell: bash
        run: |
          set -euo pipefail
          if cargo tree -p omni-node | grep -E 'halo2_proofs|pasta_curves'; then
            {
              echo "::error::omni-contributor (or its deps) leaked halo2/pasta into the"
              echo "default omni-node graph. Stage 12.0 isolation broke."
            } >&2
            exit 1
          fi
          echo "default tree: omni-contributor present, no halo2 — Stage 12.0 isolation intact."

  # ── (3) Submit features: full Stage 7b surface ─────────────────────────────
  #
  # No secrets needed (Stage 9c). The chain crates are public on
  # crates.io; this job runs unconditionally on every push and PR,
  # including external-fork PRs.
  submit-build-test:
    name: --features submit — build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: rustup show active-toolchain || rustup show

      - name: Cache cargo (with submit feature)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-submit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-submit-

      - name: cargo build -p omni-node --features submit
        run: cargo build -p omni-node --features submit

      - name: cargo test -p omni-sumchain --features submit
        # Live tests are `#[ignore]`'d and need OMNINODE_SUMCHAIN_RPC_URL
        # / OMNINODE_VERIFIER_SEED_HEX; we deliberately do NOT pass
        # `-- --ignored`. CI never touches mainnet / a local mirror.
        run: cargo test -p omni-sumchain --features submit

      - name: cargo test -p omni-node --features submit
        run: cargo test -p omni-node --features submit

  # ── (4) Submit dep-tree: HARD GATE — public crates must appear ─────────────
  submit-tree-check:
    name: submit tree — MUST contain sumchain-(crypto|primitives)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: rustup show active-toolchain || rustup show

      - name: Cache cargo registry / git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-tree-submit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tree-submit-

      - name: Assert `omni-node --features submit` tree DOES contain the chain crates
        shell: bash
        run: |
          set -euo pipefail
          if ! cargo tree -p omni-node --features submit | grep -Eq 'sumchain-(crypto|primitives)'; then
            {
              echo "::error::--features submit no longer pulls sumchain-crypto"
              echo "or sumchain-primitives. The submit feature has gone inert;"
              echo "re-check omni-sumchain's [features] table and the dep"
              echo "gating."
            } >&2
            exit 1
          fi
          echo "submit tree: sumchain-crypto + sumchain-primitives present as expected."

  # ── Stage 11b.1.b: halo2-reference-verify build + test ──────────────────────
  #
  # Verifier-only: builds `omni-proofs-halo2-reference` with the
  # `verify` feature and runs the integration test that loads the
  # committed `fixtures/halo2/params.bin` + `proof_artifact.json`
  # and verifies the proof. The PROVER feature is intentionally NOT
  # exercised in CI (heavier deps + the regen tool lives in
  # `tools/halo2_reference_regen/`, which is workspace-excluded).
  halo2-reference-verify-build-test:
    name: --features halo2-reference-verify — verifier-only build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: rustup show active-toolchain || rustup show

      - name: Cache cargo registry / git / target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-halo2verify-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-halo2verify-

      - name: cargo build -p omni-node --features halo2-reference-verify
        run: cargo build -p omni-node --features halo2-reference-verify

      # Stage 11b.1.b — run the FULL --features verify test suite
      # (unit tests + integration tests). The earlier scoping to a
      # single --test target masked compile errors in feature-gated
      # unit tests inside src/verifier.rs.
      - name: cargo test -p omni-proofs-halo2-reference --features verify
        run: |
          cargo test \
            -p omni-proofs-halo2-reference \
            --features verify

  # ── Stage 11b.1.b: opt-in tree-check ───────────────────────────────────────
  #
  # HARD GATE: with `--features halo2-reference-verify`, `omni-node`
  # MUST pull `halo2_proofs` (otherwise the feature has silently
  # gone inert).
  halo2-reference-verify-tree-check:
    name: halo2-reference-verify tree — must contain halo2_proofs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: rustup show active-toolchain || rustup show

      - name: Cache cargo registry / git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-tree-halo2verify-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tree-halo2verify-

      - name: Assert `omni-node --features halo2-reference-verify` tree DOES contain halo2
        shell: bash
        run: |
          set -euo pipefail
          if ! cargo tree -p omni-node --features halo2-reference-verify | grep -Eq 'halo2_proofs'; then
            {
              echo "::error::--features halo2-reference-verify no longer pulls halo2_proofs."
              echo "The Stage 11b.1.b feature has gone inert; re-check the"
              echo "omni-node feature definition and the dep gating on"
              echo "omni-proofs-halo2-reference."
            } >&2
            exit 1
          fi
          echo "halo2-reference-verify tree: halo2_proofs present as expected."

  # ── Stage 11d.2: stage11d-production-verify build + test ───────────────────
  #
  # Verifier-only: builds `omni-proofs-halo2-production-mlp` with the
  # `verify` feature (no prover surface, no `rand_chacha`) and runs
  # the verifier-only / corpus integration tests against the
  # committed fixtures. The full prover surface is exercised
  # off-CI by `tools/halo2_production_mlp_regen/`, which is
  # workspace-excluded.
  #
  # The Stage 11d.2 production circuit is wider than the bounded
  # reference (16 → 32 → 16 → 8 vs 4 → 8 → 4); MockProver
  # invocations stack-overflow at the default 2 MB test stack.
  # `RUST_MIN_STACK` is raised here so the constraint-system
  # walker has headroom.
  stage11d-production-verify-build-test:
    name: --features stage11d-production-verify — verifier-only build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: rustup show active-toolchain || rustup show

      - name: Cache cargo registry / git / target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-stage11dverify-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stage11dverify-

      - name: cargo build -p omni-node --features stage11d-production-verify
        run: cargo build -p omni-node --features stage11d-production-verify

      - name: cargo test -p omni-proofs-halo2-production-mlp --features verify
        env:
          RUST_MIN_STACK: "67108864"
        run: |
          cargo test \
            -p omni-proofs-halo2-production-mlp \
            --features verify

  # ── Stage 11d.2: opt-in tree-check ─────────────────────────────────────────
  #
  # HARD GATE: with `--features stage11d-production-verify`, `omni-node`
  # MUST pull `halo2_proofs` AND `omni-proofs-halo2-production-mlp`
  # (otherwise the feature has silently gone inert).
  stage11d-production-verify-tree-check:
    name: stage11d-production-verify tree — must contain halo2_proofs + production-mlp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: rustup show active-toolchain || rustup show

      - name: Cache cargo registry / git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-tree-stage11dverify-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tree-stage11dverify-

      - name: Assert `omni-node --features stage11d-production-verify` tree DOES contain halo2 + production-mlp
        shell: bash
        run: |
          set -euo pipefail
          tree_out="$(cargo tree -p omni-node --features stage11d-production-verify)"
          if ! echo "$tree_out" | grep -Eq 'halo2_proofs'; then
            {
              echo "::error::--features stage11d-production-verify no longer pulls halo2_proofs."
              echo "The Stage 11d.2 feature has gone inert; re-check the"
              echo "omni-node feature definition and the dep gating on"
              echo "omni-proofs-halo2-production-mlp."
            } >&2
            exit 1
          fi
          if ! echo "$tree_out" | grep -Eq 'omni-proofs-halo2-production-mlp'; then
            {
              echo "::error::--features stage11d-production-verify no longer pulls omni-proofs-halo2-production-mlp."
              echo "The Stage 11d.2 feature gating is broken."
            } >&2
            exit 1
          fi
          echo "stage11d-production-verify tree: halo2_proofs + production-mlp present as expected."

  # ── Stage 12.0: omni-contributor build + test ──────────────────────────────
  #
  # AttestationOnly contributor workflow. Default features only — there
  # are no other features on the crate in 12.0. No halo2, no prover, no
  # framework runtime; the `posture_preserved` test additionally guards
  # against any IPFS-terminology drift in new code.
  contributor-build-test:
    name: omni-contributor — default-features build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: rustup show active-toolchain || rustup show

      - name: Cache cargo registry / git / target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-contributor-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-contributor-

      - name: cargo build -p omni-contributor
        run: cargo build -p omni-contributor

      - name: cargo test -p omni-contributor
        run: cargo test -p omni-contributor

      - name: cargo build -p omni-node (with omni-contributor in graph)
        run: cargo build -p omni-node

  # ── (5) Stage 6 byte-stability ──────────────────────────────────────────────
  stage6-fixture-check:
    name: Stage 6 chain-wire + fixture — byte-stable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need a base commit for diff

      - name: Resolve base ref
        id: base
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ref="${{ github.event.pull_request.base.sha }}"
          else
            ref="${{ github.event.before }}"
          fi
          if [ -z "$ref" ] || [ "$ref" = "0000000000000000000000000000000000000000" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true"  >> "$GITHUB_OUTPUT"
            echo "ref=$ref"        >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — no usable base ref
        if: steps.base.outputs.available == 'false'
        run: |
          echo "::notice::No usable base ref (initial push or shallow). Stage 6"
          echo "          byte-stability is still required; will re-verify on the"
          echo "          next push or PR."

      - name: Assert chain-wire fixture + chain_wire.rs byte-identical
        if: steps.base.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          base="${{ steps.base.outputs.ref }}"
          diff_out="$(git diff --stat "$base"..HEAD -- \
            crates/omni-zkml/tests/fixtures/chain_attestation_vectors.json \
            crates/omni-zkml/src/chain_wire.rs)"
          if [ -n "$diff_out" ]; then
            {
              echo "::error::Stage 6 byte-stability gate failed."
              echo "These files are byte-stable across all post-Stage-6 work:"
              echo "  crates/omni-zkml/tests/fixtures/chain_attestation_vectors.json"
              echo "  crates/omni-zkml/src/chain_wire.rs"
              echo
              echo "Observed diff vs $base:"
              echo "$diff_out"
            } >&2
            exit 1
          fi
          echo "Stage 6 fixture + chain_wire.rs: byte-identical vs $base."

  # ── (6) Stage 11a proof pipeline fixture byte-stability ─────────────────────
  #
  # Mirrors the Stage 6 gate above for the Stage 11a hermetic fixture.
  # `proof_pipeline_vectors.json` records the full mock-backend proof
  # pipeline output (BLAKE3 hashes, mock proof bytes, canonical proof
  # envelope, commitment, chain-wire digest, Ed25519 signature). The
  # vectors are deterministic for the committed inputs in
  # `crates/omni-zkml/tests/proof_pipeline_vectors.rs`. Any drift —
  # whether in `MockProofBackend`, the canonical JSON envelope, the
  # Stage 6 chain-wire path, or the Stage 4 attestation envelope —
  # surfaces here loudly.
  stage11a-fixture-check:
    name: Stage 11a proof pipeline fixture — byte-stable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve base ref
        id: base
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ref="${{ github.event.pull_request.base.sha }}"
          else
            ref="${{ github.event.before }}"
          fi
          if [ -z "$ref" ] || [ "$ref" = "0000000000000000000000000000000000000000" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true"  >> "$GITHUB_OUTPUT"
            echo "ref=$ref"        >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — no usable base ref
        if: steps.base.outputs.available == 'false'
        run: |
          echo "::notice::No usable base ref (initial push or shallow). Stage 11a"
          echo "          proof pipeline byte-stability is still required; will"
          echo "          re-verify on the next push or PR."

      - name: Assert proof pipeline fixture byte-identical
        if: steps.base.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          base="${{ steps.base.outputs.ref }}"
          fixture="crates/omni-zkml/tests/fixtures/proof_pipeline_vectors.json"

          # Distinguish "file is being introduced by this PR" from "file
          # exists on base and is being modified". On the introductory PR
          # the file isn't on the base ref at all, so a plain `git diff`
          # against base reports a +N-line addition — but that's the
          # baseline being established, not drift. Once the fixture
          # exists on main, every subsequent PR is gated strictly.
          if ! git cat-file -e "$base:$fixture" 2>/dev/null; then
            echo "::notice::Stage 11a proof pipeline fixture is being"
            echo "          introduced by this PR (file does not exist at"
            echo "          base $base). Byte-stability gate skipped for"
            echo "          this introductory commit. The fixture becomes"
            echo "          immutable for all subsequent PRs."
            exit 0
          fi

          diff_out="$(git diff --stat "$base"..HEAD -- "$fixture")"
          if [ -n "$diff_out" ]; then
            {
              echo "::error::Stage 11a proof pipeline byte-stability gate failed."
              echo "This file is byte-stable across all post-Stage-11a work:"
              echo "  $fixture"
              echo
              echo "If the change is intentional (e.g. MockProofBackend formula"
              echo "bumped to mock-v2), regenerate the fixture with"
              echo "OMNINODE_REGEN_PROOF_PIPELINE_VECTORS=1 and document the"
              echo "reason in the PR body. Drift without justification is a"
              echo "real regression — the mock pipeline is meant to be a stable"
              echo "deterministic contract."
              echo
              echo "Observed diff vs $base:"
              echo "$diff_out"
            } >&2
            exit 1
          fi
          echo "Stage 11a proof pipeline fixture: byte-identical vs $base."
