# OmniNode Protocol — Stage 9b CI matrix.
#
# Triggers: push to `main` + pull_request targeting `main`.
#
# Jobs:
#   1. default-build-test          — public, no secrets.
#   2. default-tree-check          — public, no secrets; HARD GATE: fails
#                                    if the default `omni-node` build
#                                    pulls private SUM Chain crates.
#   3. stage6-fixture-check        — public, no secrets; HARD GATE: fails
#                                    if `crates/omni-zkml/tests/fixtures/
#                                    chain_attestation_vectors.json` or
#                                    `crates/omni-zkml/src/chain_wire.rs`
#                                    has changed in the PR / push diff.
#   4. check-submit-auth           — public; outputs whether
#                                    SUM_CHAIN_DEPLOY_KEY or
#                                    SUM_CHAIN_PAT is configured.
#   5. submit-build-test           — runs IFF (4) found a credential.
#                                    Gated as a clear SKIP (not a red
#                                    failure) on external forks or when
#                                    the secret is absent.
#   6. submit-skip-notice          — runs IFF no credential. Emits a
#                                    `::notice::` so reviewers see why
#                                    the submit suite did not execute.
#
# Live `omni-sumchain` tests (`#[ignore]`'d, env-var-gated against
# `OMNINODE_SUMCHAIN_RPC_URL` / `OMNINODE_VERIFIER_SEED_HEX`) are NOT
# run in CI. They remain operator-driven.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Speed up subsequent runs without paying the unstable-flag tax.
  CARGO_INCREMENTAL: "0"

jobs:
  # ── (1) Default features: read-only operator surface ────────────────────────
  default-build-test:
    name: default (read-only) — build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain (honours rust-toolchain.toml)
        run: rustup show active-toolchain || rustup show

      - name: Cache cargo registry / git / target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-default-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-default-

      - name: cargo build -p omni-node (default features)
        run: cargo build -p omni-node

      - name: cargo test (workspace minus omni-bridge / PyO3)
        run: |
          cargo test \
            -p omni-net \
            -p omni-pipeline \
            -p omni-store \
            -p omni-types \
            -p omni-zkml \
            -p omni-sumchain \
            -p omni-node

  # ── (2) Default dep-tree: HARD GATE on the Stage 9a decoupling ──────────────
  default-tree-check:
    name: default tree — must NOT contain private SUM Chain crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: rustup show active-toolchain || rustup show

      - name: Cache cargo registry / git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-tree-default-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tree-default-

      - name: Assert `omni-node` default tree has NO sumchain-(crypto|primitives)
        shell: bash
        run: |
          set -euo pipefail
          tree_out="$(cargo tree -p omni-node)"
          if echo "$tree_out" | grep -E 'sumchain-(crypto|primitives)'; then
            {
              echo "::error::Default \`omni-node\` build pulls private SUM Chain crates."
              echo "Stage 9a's decoupling has regressed. Default builds must not need"
              echo "GitHub access to SUM-INNOVATION/sum-chain. To gate the submit"
              echo "path, rebuild with --features submit."
            } >&2
            exit 1
          fi
          echo "default tree: no sumchain-crypto / sumchain-primitives — decoupling intact."

  # ── (3) Stage 6 byte-stability ──────────────────────────────────────────────
  stage6-fixture-check:
    name: Stage 6 chain-wire + fixture — byte-stable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need a base commit for diff

      - name: Resolve base ref
        id: base
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ref="${{ github.event.pull_request.base.sha }}"
          else
            ref="${{ github.event.before }}"
          fi
          # First-commit / shallow / force-push edge cases give us
          # 40 zeroes or empty; treat as "no usable base — skip".
          if [ -z "$ref" ] || [ "$ref" = "0000000000000000000000000000000000000000" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true"  >> "$GITHUB_OUTPUT"
            echo "ref=$ref"        >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — no usable base ref
        if: steps.base.outputs.available == 'false'
        run: |
          echo "::notice::No usable base ref (initial push or shallow). Stage 6"
          echo "          byte-stability is still required; will re-verify on the"
          echo "          next push or PR."

      - name: Assert chain-wire fixture + chain_wire.rs byte-identical
        if: steps.base.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          base="${{ steps.base.outputs.ref }}"
          diff_out="$(git diff --stat "$base"..HEAD -- \
            crates/omni-zkml/tests/fixtures/chain_attestation_vectors.json \
            crates/omni-zkml/src/chain_wire.rs)"
          if [ -n "$diff_out" ]; then
            {
              echo "::error::Stage 6 byte-stability gate failed."
              echo "These files are byte-stable across all post-Stage-6 work:"
              echo "  crates/omni-zkml/tests/fixtures/chain_attestation_vectors.json"
              echo "  crates/omni-zkml/src/chain_wire.rs"
              echo
              echo "Observed diff vs $base:"
              echo "$diff_out"
            } >&2
            exit 1
          fi
          echo "Stage 6 fixture + chain_wire.rs: byte-identical vs $base."

  # ── (4) Probe for SUM Chain credentials ─────────────────────────────────────
  #
  # We deliberately do NOT reference `secrets.*` in job-level `if:` (gives
  # GHA expression headaches across runner versions); a guard job emits a
  # plain string output that downstream jobs gate on. The probe never
  # echoes the secret value itself — only whether it's present.
  check-submit-auth:
    name: probe — SUM Chain credentials present?
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.probe.outputs.auth }}
    steps:
      - id: probe
        env:
          DEPLOY_KEY_PRESENT: ${{ secrets.SUM_CHAIN_DEPLOY_KEY != '' }}
          PAT_PRESENT:        ${{ secrets.SUM_CHAIN_PAT != '' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$DEPLOY_KEY_PRESENT" = "true" ]; then
            echo "auth=deploy_key" >> "$GITHUB_OUTPUT"
          elif [ "$PAT_PRESENT" = "true" ]; then
            echo "auth=pat"        >> "$GITHUB_OUTPUT"
          else
            echo "auth=none"       >> "$GITHUB_OUTPUT"
          fi

  # ── (5) Submit feature: needs private SUM Chain repo access ─────────────────
  submit-build-test:
    name: --features submit — build + test
    runs-on: ubuntu-latest
    needs: check-submit-auth
    if: ${{ needs.check-submit-auth.outputs.auth != 'none' }}
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: rustup show active-toolchain || rustup show

      # Prefer the deploy key when available; PAT is the fallback.
      # Both branches install a REPO-SCOPED git `insteadOf` rewrite so
      # Cargo's vendored chain dep — declared at
      # `https://github.com/SUM-INNOVATION/sum-chain` — actually
      # resolves through the configured credential. Without the
      # rewrite, the ssh-agent / token sits idle while Cargo runs
      # anonymous HTTPS against a private repo and 404s.
      - name: Configure SSH agent (deploy key)
        if: ${{ needs.check-submit-auth.outputs.auth == 'deploy_key' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SUM_CHAIN_DEPLOY_KEY }}

      - name: Rewrite SUM Chain HTTPS URL to SSH (deploy-key branch)
        if: ${{ needs.check-submit-auth.outputs.auth == 'deploy_key' }}
        shell: bash
        run: |
          set -euo pipefail
          # Repo-scoped: only the chain repo gets rerouted to SSH, so
          # other workspace deps and cargo registry traffic keep their
          # default transport. ssh-agent (above) supplies the key;
          # webfactory/ssh-agent has already added github.com to
          # known_hosts.
          git config --global \
            "url.git@github.com:SUM-INNOVATION/sum-chain.insteadOf" \
            "https://github.com/SUM-INNOVATION/sum-chain"

      - name: Configure git credential (PAT fallback)
        if: ${{ needs.check-submit-auth.outputs.auth == 'pat' }}
        shell: bash
        env:
          SUM_CHAIN_PAT: ${{ secrets.SUM_CHAIN_PAT }}
        run: |
          set -euo pipefail
          # Repo-scoped (matches the deploy-key branch): the PAT is
          # only used for the chain repo. `x-access-token` is the
          # GitHub-recommended username for PATs.
          git config --global \
            "url.https://x-access-token:${SUM_CHAIN_PAT}@github.com/SUM-INNOVATION/sum-chain.insteadOf" \
            "https://github.com/SUM-INNOVATION/sum-chain"

      - name: Cache cargo (with submit feature)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-submit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-submit-

      - name: cargo build -p omni-node --features submit
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: cargo build -p omni-node --features submit

      - name: cargo test -p omni-sumchain --features submit
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        # Live tests are `#[ignore]`'d and need OMNINODE_SUMCHAIN_RPC_URL
        # / OMNINODE_VERIFIER_SEED_HEX; we deliberately do NOT pass
        # `-- --ignored`. CI never touches mainnet / a local mirror.
        run: cargo test -p omni-sumchain --features submit

      - name: cargo test -p omni-node --features submit
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: cargo test -p omni-node --features submit

      - name: Assert `omni-node --features submit` tree DOES contain vendored chain crates
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        shell: bash
        run: |
          set -euo pipefail
          if ! cargo tree -p omni-node --features submit | grep -Eq 'sumchain-(crypto|primitives)'; then
            {
              echo "::error::--features submit no longer pulls the vendored chain"
              echo "crates — the submit feature has gone inert. Re-check"
              echo "omni-sumchain's [features] table and the dep gating."
            } >&2
            exit 1
          fi
          echo "submit tree: vendored chain crates present as expected."

  # ── (6) Clear-skip notice when no credential is configured ─────────────────
  submit-skip-notice:
    name: --features submit — skipped (no SUM Chain credential)
    runs-on: ubuntu-latest
    needs: check-submit-auth
    if: ${{ needs.check-submit-auth.outputs.auth == 'none' }}
    steps:
      - name: Explain skip
        shell: bash
        run: |
          {
            echo "::notice::Submit-feature CI skipped — no SUM Chain credential available."
            echo "Expected for:"
            echo "  - External-fork PRs (GitHub does not flow secrets to forks)."
            echo "  - Repositories without SUM_CHAIN_DEPLOY_KEY or SUM_CHAIN_PAT configured."
            echo
            echo "Default build, default tree check, and the Stage 6 byte-stability"
            echo "gate still ran. Operators with chain credentials can verify the"
            echo "submit path locally:"
            echo "  cargo test -p omni-sumchain --features submit"
            echo "  cargo test -p omni-node     --features submit"
          }
